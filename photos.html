<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Photos</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: whitesmoke;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 { margin-bottom: 5px; }
        p { color: black; }

        nav {
            background: #1e40af;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 15px;
            font-weight: 500;
            position: relative;
        }

        
        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: white;
            left: 0;
            bottom: -4px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .photo {
            background: whitesmoke;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .photo img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        .photo p {
            margin-top: 8px;
            font-weight: 500;
        }

        .photo {
            width: 240px;
            background: whitesmoke;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <h1>📸 10-Sapphire Activities</h1>
    <p>Celebrating our memories!</p>

    <nav>
        <a href="index.html">Classmates</a>
        <a href="attendance.html">Attendance</a>
        <a href="photos.html">Photos</a>
    </nav>

    <div id="gallery"></div>

    <py-script src="photos.py"></py-script>

</body>
</html>
